databases:
  - name: merch-iq-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"

services:
  # ── API — Node/Express + Prisma ──────────────────────────────────────────
  - type: web
    name: merch-iq-api
    runtime: node
    plan: free
    region: singapore
    rootDir: api
    # Free plan doesn't support preDeployCommand, so migrations run as part
    # of the build step instead. Upgrade to a paid instance and switch to
    # `preDeployCommand: npx prisma migrate deploy` for zero-downtime deploys.
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: merch-iq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://merch-iq-app.onrender.com
      - key: APP_URL
        value: https://merch-iq-api.onrender.com
      - key: FRONTEND_URL
        value: https://merch-iq-app.onrender.com
      # S3 / Cloudflare R2 — leave blank to keep dev-placeholder mode for
      # product photo uploads (uploads won't actually persist). Fill in via
      # the Render dashboard once you have a bucket.
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      # Integration credentials — fill in via the Render dashboard, not committed
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: AMAZON_CLIENT_ID
        sync: false
      - key: AMAZON_CLIENT_SECRET
        sync: false
      - key: AMAZON_APP_ID
        sync: false
      - key: FLIPKART_CLIENT_ID
        sync: false
      - key: FLIPKART_CLIENT_SECRET
        sync: false
      - key: WHATSAPP_APP_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: ETSY_CLIENT_ID
        sync: false
      - key: ETSY_CLIENT_SECRET
        sync: false
      - key: MYNTRA_CLIENT_ID
        sync: false
      - key: MYNTRA_CLIENT_SECRET
        sync: false

  # ── Frontend — React (CRA) static site ───────────────────────────────────
  - type: web
    name: merch-iq-app
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://merch-iq-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
