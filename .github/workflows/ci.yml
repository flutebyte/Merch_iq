name: CI

# ── When should this run? ────────────────────────────────────────────────
# GitHub runs this workflow automatically on these events.
on:
  push:
    branches: [main]      # every commit that lands on main
  pull_request:           # every PR (including your daily automated ones)
  workflow_dispatch:      # a manual "Run" button in the Actions tab

# If you push again to the same branch/PR before a run finishes, cancel the
# older run — you only care about the newest code, and it saves minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: run the backend test suite ──────────────────────────────────
  api-tests:
    name: API tests
    runs-on: ubuntu-latest        # a fresh Linux machine in GitHub's cloud
    defaults:
      run:
        working-directory: api    # run every command below inside the api/ folder
    steps:
      # Download your repo onto the cloud machine.
      - name: Check out the code
        uses: actions/checkout@v4

      # Install Node 20, and cache npm downloads so installs are fast next time.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      # `npm ci` = a clean, exact install from package-lock.json (the CI standard).
      - name: Install dependencies
        run: npm ci

      # Your 46 Jest tests.
      - name: Run tests
        run: npm test

      # Flag known-vulnerable dependencies. Informational: it reports problems
      # but does NOT fail the build (audit is noisy with transitive packages).
      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Job 2: make sure the frontend still compiles ───────────────────────
  # Runs in parallel with Job 1. Catches the case where a change breaks the
  # React build even though it looks fine in the editor.
  web-build:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Create React App treats lint warnings as build errors when CI=true.
      # Set CI=false so warnings don't fail the build (flip to true later if
      # you want a stricter, warning-free bar).
      - name: Build
        run: npm run build
        env:
          CI: false
